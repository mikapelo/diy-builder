<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9971E;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#E8B84B;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9971E;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#C9971E;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#C9971E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C9971E;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F3F2EE"/>

  <!-- Decorative rectangle bottom-right (gold gradient) -->
  <rect x="780" y="380" width="520" height="350" rx="24" fill="url(#goldGrad)"/>

  <!-- Subtle grid texture (top-left decorative corner) -->
  <rect x="-40" y="-40" width="320" height="320" rx="20" fill="#C9971E" opacity="0.06"/>
  <rect x="20" y="20" width="220" height="220" rx="14" fill="#C9971E" opacity="0.05"/>

  <!-- Gold accent line -->
  <rect x="0" y="312" width="1200" height="2" fill="url(#accentLine)" opacity="0.3"/>

  <!-- Main title: DIY Builder -->
  <text
    x="600"
    y="230"
    font-family="Manrope, Inter, sans-serif"
    font-size="96"
    font-weight="800"
    fill="#111214"
    text-anchor="middle"
    letter-spacing="-2"
  >DIY Builder</text>

  <!-- Gold underline accent -->
  <rect x="430" y="252" width="340" height="5" rx="3" fill="#C9971E"/>

  <!-- Subtitle -->
  <text
    x="600"
    y="318"
    font-family="Manrope, Inter, sans-serif"
    font-size="28"
    font-weight="500"
    fill="#6b5f4f"
    text-anchor="middle"
    letter-spacing="0.2"
  >Calculateur de projets bois • Gratuit</text>

  <!-- Module icons row -->
  <text
    x="600"
    y="414"
    font-family="Manrope, Inter, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#111214"
    text-anchor="middle"
    opacity="0.72"
  >🪵 Terrasse    🏠 Cabanon    🌿 Pergola    🪧 Clôture</text>

  <!-- Separator -->
  <rect x="540" y="448" width="120" height="1.5" rx="1" fill="#C9971E" opacity="0.45"/>

  <!-- Domain -->
  <text
    x="600"
    y="498"
    font-family="Manrope, Inter, sans-serif"
    font-size="22"
    font-weight="600"
    fill="#C9971E"
    text-anchor="middle"
    letter-spacing="1"
  >diy-builder.fr</text>

  <!-- Bottom tagline -->
  <text
    x="600"
    y="570"
    font-family="Manrope, Inter, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#111214"
    text-anchor="middle"
    opacity="0.35"
    letter-spacing="1.5"
  >VISUALISATION 3D • EXPORT PDF • COMPARATIF ENSEIGNES</text>
</svg>
