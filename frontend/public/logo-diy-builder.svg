<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Wood top face (lightest) -->
    <linearGradient id="wt" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#D4A050"/>
      <stop offset="25%" stop-color="#C89548"/>
      <stop offset="50%" stop-color="#D2A254"/>
      <stop offset="75%" stop-color="#C08E42"/>
      <stop offset="100%" stop-color="#CDA050"/>
    </linearGradient>
    <!-- Wood left face (medium) -->
    <linearGradient id="wl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9B6B35"/>
      <stop offset="30%" stop-color="#8A5E2E"/>
      <stop offset="60%" stop-color="#96682F"/>
      <stop offset="100%" stop-color="#7E5428"/>
    </linearGradient>
    <!-- Wood right face (darkest) -->
    <linearGradient id="wr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B4E28"/>
      <stop offset="35%" stop-color="#6E4422"/>
      <stop offset="65%" stop-color="#7A4D26"/>
      <stop offset="100%" stop-color="#643C1C"/>
    </linearGradient>
    <!-- Badge background -->
    <radialGradient id="bg" cx="48%" cy="46%" r="50%">
      <stop offset="0%" stop-color="#F5E2B8"/>
      <stop offset="80%" stop-color="#EDCF98"/>
      <stop offset="100%" stop-color="#E8C88E"/>
    </radialGradient>
    <!-- Badge border -->
    <radialGradient id="br" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#6B4024"/>
      <stop offset="100%" stop-color="#5A3218"/>
    </radialGradient>
  </defs>

  <!-- Brown outer ring -->
  <circle cx="200" cy="200" r="185" fill="url(#br)"/>
  <!-- Beige inner circle -->
  <circle cx="200" cy="200" r="172" fill="url(#bg)"/>

  <!-- === Y-JOINT === -->
  <g transform="translate(200,160)">

    <!-- ====== BOTTOM VERTICAL BEAM (going down) ====== -->
    <!-- Left face -->
    <polygon points="-16,10 -16,80 0,90 0,20" fill="url(#wl)"/>
    <!-- Right face -->
    <polygon points="0,20 0,90 16,80 16,10" fill="url(#wr)"/>
    <!-- Top face (hidden by joint, but drawn for overlap) -->
    <polygon points="-16,10 0,0 16,10 0,20" fill="url(#wt)"/>

    <!-- Wood grain lines - vertical beam left face -->
    <line x1="-10" y1="20" x2="-10" y2="78" stroke="#7E5428" stroke-width="0.8" opacity="0.3"/>
    <line x1="-5" y1="16" x2="-5" y2="82" stroke="#8A5E2E" stroke-width="0.6" opacity="0.25"/>
    <!-- Wood grain lines - vertical beam right face -->
    <line x1="6" y1="24" x2="6" y2="84" stroke="#64401E" stroke-width="0.8" opacity="0.3"/>
    <line x1="11" y1="18" x2="11" y2="78" stroke="#6E4422" stroke-width="0.6" opacity="0.25"/>

    <!-- ====== LEFT BEAM (going upper-left) ====== -->
    <!-- Right side face (facing viewer) -->
    <polygon points="-16,10 -80,-28 -80,-48 -16,-10" fill="url(#wr)"/>
    <!-- Top face -->
    <polygon points="-16,-10 -80,-48 -64,-56 0,0" fill="url(#wt)"/>
    <!-- Left side face -->
    <polygon points="-80,-48 -64,-56 -64,-36 -80,-28" fill="url(#wl)"/>

    <!-- Wood grain - left beam top -->
    <line x1="-50" y1="-38" x2="-24" y2="-14" stroke="#B08040" stroke-width="0.7" opacity="0.25"/>
    <line x1="-58" y1="-42" x2="-32" y2="-18" stroke="#C09048" stroke-width="0.6" opacity="0.2"/>
    <!-- Wood grain - left beam right face -->
    <line x1="-48" y1="-18" x2="-44" y2="-16" stroke="#5E3818" stroke-width="0.7" opacity="0.3"/>
    <line x1="-60" y1="-24" x2="-56" y2="-22" stroke="#64401E" stroke-width="0.6" opacity="0.25"/>

    <!-- ====== RIGHT BEAM (going upper-right) ====== -->
    <!-- Left side face (facing viewer) -->
    <polygon points="16,10 80,-28 80,-48 16,-10" fill="url(#wl)"/>
    <!-- Top face -->
    <polygon points="0,0 64,-56 80,-48 16,-10" fill="url(#wt)"/>
    <!-- Right side face -->
    <polygon points="64,-56 80,-48 80,-28 64,-36" fill="url(#wr)"/>

    <!-- Wood grain - right beam top -->
    <line x1="24" y1="-14" x2="50" y2="-38" stroke="#B08040" stroke-width="0.7" opacity="0.25"/>
    <line x1="32" y1="-18" x2="58" y2="-42" stroke="#C09048" stroke-width="0.6" opacity="0.2"/>
    <!-- Wood grain - right beam left face -->
    <line x1="48" y1="-18" x2="44" y2="-16" stroke="#7E5428" stroke-width="0.7" opacity="0.3"/>
    <line x1="60" y1="-24" x2="56" y2="-22" stroke="#8A5E2E" stroke-width="0.6" opacity="0.25"/>

    <!-- ====== CENTER JOINT OVERLAP ====== -->
    <!-- Top face of joint center -->
    <polygon points="-16,-10 0,-20 16,-10 0,0" fill="#C89845" stroke="#B08040" stroke-width="0.5"/>
    <!-- Small shadow lines at joints -->
    <line x1="-16" y1="-10" x2="-16" y2="10" stroke="#5A3218" stroke-width="1.2" opacity="0.4"/>
    <line x1="16" y1="-10" x2="16" y2="10" stroke="#5A3218" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#5A3218" stroke-width="1" opacity="0.3"/>

  </g>

  <!-- DIY BUILDER text -->
  <text x="200" y="310"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="30"
        font-weight="900"
        letter-spacing="4"
        fill="#5C3520">DIY BUILDER</text>
</svg>
