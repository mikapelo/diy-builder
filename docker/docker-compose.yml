# ── docker-compose.yml ────────────────────────────────────────
# Lance les 3 services en une seule commande :
#   docker-compose up --build
#
# Services :
#   - postgres    : PostgreSQL 15 avec initialisation automatique
#   - backend     : API Express sur http://localhost:4000
#   - frontend    : Next.js sur http://localhost:3000
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: diy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       diy_builder
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Données persistées entre les redémarrages
      - postgres_data:/var/lib/postgresql/data
      # Le schema.sql est exécuté automatiquement au premier démarrage
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d diy_builder"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: diy_backend
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         4000
      DB_HOST:      postgres      # nom du service Docker
      DB_PORT:      5432
      DB_NAME:      diy_builder
      DB_USER:      postgres
      DB_PASSWORD:  postgres
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy  # attend que PostgreSQL soit prêt
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend Next.js ─────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        # URL publique de l'API — accessible depuis le navigateur client
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: diy_frontend
    restart: unless-stopped
    environment:
      NODE_ENV:              production
      NEXT_PUBLIC_API_URL:   http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy  # attend que le backend soit prêt

# ── Volumes persistants ──────────────────────────────────────
volumes:
  postgres_data:
    driver: local
